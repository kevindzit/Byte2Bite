<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Byte 2 Bite - Order History</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="history-page">
  <h1>Byte 2 Bite - Completed Orders</h1>
  <button class="back-btn" onclick="goBack()">⬅ Back to Active Orders</button>

  <div class="orders-view">
    <div class="orders" id="orders"></div>
  </div>

  <div class="history-controls">
    <button class="nav-btn" onclick="scrollOrders('left')">⬅ Scroll Left</button>
    <button class="nav-btn" onclick="scrollOrders('right')">➡ Scroll Right</button>
  </div>

  <script>
    async function loadHistory() {
      const response = await fetch("http://127.0.0.1:5000/api/history");  // NOTE: Change the API base URL if running Flask on a different server or port.

      const orders = await response.json();

      const container = document.getElementById("orders");
      container.innerHTML = "";

      if (orders.length === 0) {
        container.innerHTML = "<p>No completed orders yet.</p>";
        return;
      }

      orders
        .sort((a, b) => {
          const dateA = new Date(a.completed_at || a.created_at || 0);
          const dateB = new Date(b.completed_at || b.created_at || 0);
          return dateB - dateA;
        })
        .forEach(order => {
        const div = document.createElement("div");
        div.className = "order";
        div.innerHTML = `
          <p><strong>Order #${order.id}</strong></p>
          <p><strong>Customer:</strong> ${order.customer_name}</p>
          <p><strong>Items:</strong> ${order.items}</p>
          <p><strong>Status:</strong> ${order.status}</p>
          <p><strong>Completed at:</strong> ${order.created_at}</p>
        `;
        container.appendChild(div);
      });
    }

    function goBack() {
      window.location.href = "index.html";
    }

    function scrollOrders(direction) {
      const container = document.querySelector(".orders-view");
      if (!container) return;
      const step = container.clientWidth || 300;
      const offset = direction === "left" ? -step : step;
      container.scrollBy({
        left: offset,
        behavior: "smooth"
      });
    }

    loadHistory();
  </script>
</body>
</html>
