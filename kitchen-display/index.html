<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Byte 2 Bite - Kitchen Display System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Byte 2 Bite - Kitchen Display System</h1>
  <div id="order-container"><p>Loading orders...</p></div>

  <div class="controls">
    <button class="arrow-btn" onclick="prevOrder()">⬅</button>
    <button class="prep-btn" onclick="updateStatus('Preparing')">Preparing</button>
    <button class="done-btn" onclick="updateStatus('Completed')">Complete</button>
    <button class="undo-btn" onclick="undoLastAction()">Undo</button>
    <button class="arrow-btn" onclick="nextOrder()">➡</button>
  </div>

  <a href="history.html" class="history-btn">View Completed Orders</a>

  <script>
    let orders = [];
    let currentIndex = 0;
    let lastAction = null;

    async function loadOrders() {
      try {
        const res = await fetch("http://127.0.0.1:5000/api/orders"); // NOTE: Change the API base URL if running Flask on a different server or port.
        if (!res.ok) throw new Error("Failed to fetch orders");
        orders = await res.json();
        console.log("Orders received from server:", orders);
        showOrder();
      } catch (err) {
        document.getElementById("order-container").innerHTML =
          "<p style='color:red;'>Error loading orders</p>";
        console.error(err);
      }
    }

    function showOrder() {
      const container = document.getElementById("order-container");
      container.innerHTML = "";

      if (!orders || orders.length === 0) {
        container.innerHTML = "<p>No active orders</p>";
        return;
      }

      if (currentIndex >= orders.length) currentIndex = Math.max(orders.length - 1, 0);

      orders.forEach((order, index) => {
        let borderColor = "orange";
        if (order.status.toLowerCase() === "preparing") borderColor = "yellow";
        else if (order.status.toLowerCase() === "completed") borderColor = "limegreen";

        const div = document.createElement("div");
        div.className = "order-card";
        if (index === currentIndex) div.classList.add("selected");
        div.style.borderLeft = `10px solid ${borderColor}`;
        const customerName = getCustomerName(order);

        div.innerHTML = `
          <h3>
            <span>Order #${order.id}</span>
            <span>Status: ${order.status}</span>
          </h3>
          <p><strong>Customer:</strong> ${customerName}</p>
          <ul>${order.items.split(",").map(i => `<li>${i.trim()}</li>`).join("")}</ul>
        `;

        div.addEventListener("click", () => {
          currentIndex = index;
          showOrder();
        });

        container.appendChild(div);
      });
    }


    function nextOrder() {
      if (orders.length === 0) return;
      currentIndex = (currentIndex + 1) % orders.length;
      showOrder();
    }

    function prevOrder() {
      if (orders.length === 0) return;
      currentIndex = (currentIndex - 1 + orders.length) % orders.length;
      showOrder();
    }

    async function updateStatus(status) {
      if (orders.length === 0) return;
      const currentOrder = orders[currentIndex];
      const id = currentOrder.id;
      const previousStatus = currentOrder.status;
      const previousIndex = currentIndex;
      const removedOrderSnapshot = { ...currentOrder };

      try {
        const res = await fetch(`http://127.0.0.1:5000/api/orders/${id}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ status })
        });

        if (!res.ok) throw new Error("Failed to update order status");
        console.log(`Order ${id} updated to ${status}`);

        if (status === "Completed") {
          removedOrderSnapshot.status = previousStatus;
          orders.splice(currentIndex, 1);
          if (currentIndex >= orders.length) currentIndex = 0;
          lastAction = {
            orderId: id,
            previousStatus,
            previousIndex,
            removedOrder: removedOrderSnapshot
          };
        } else {
          orders[currentIndex].status = status;
          lastAction = {
            orderId: id,
            previousStatus,
            previousIndex,
            removedOrder: null
          };
        }

        showOrder();
      } catch (err) {
        console.error(err);
        alert("Error updating order status. Check the console for details.");
      }
    }

    async function undoLastAction() {
      if (!lastAction) {
        alert("Nothing to undo yet.");
        return;
      }

      const { orderId, previousStatus, previousIndex, removedOrder } = lastAction;

      try {
        const res = await fetch(`http://127.0.0.1:5000/api/orders/${orderId}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ status: previousStatus })
        });

        if (!res.ok) throw new Error("Failed to undo last action");

        if (removedOrder) {
          orders.splice(previousIndex, 0, removedOrder);
        } else {
          const target = orders.find(order => order.id === orderId);
          if (target) target.status = previousStatus;
        }

        currentIndex = orders.length ? Math.min(previousIndex, orders.length - 1) : 0;
        lastAction = null;
        showOrder();
      } catch (err) {
        console.error(err);
        alert("Unable to undo the last action. Check the console for details.");
      }
    }

    function getCustomerName(order) {
      const direct = order.customer_name || order.customerName || order.customer;
      if (direct && direct !== "Guest") return direct;

      if (order.customer && typeof order.customer === "object") {
        const first = order.customer.firstName || order.customer.FirstName || "";
        const last = order.customer.lastName || order.customer.LastName || "";
        const full = `${first} ${last}`.trim();
        if (full) return full;
      }

      return "Guest";
    }

    // Auto-refresh every 1 seconds
    setInterval(loadOrders, 1000);
    loadOrders();
  </script>
</body>
</html>
