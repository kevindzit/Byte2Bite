<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Byte2Bite - Choose Location</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="hero">
    <header>
      <h1>Mi Casa Restaurant</h1>
    </header>
  </div>

  <main>
    <h2>Select a Location</h2>
    <p>or enter ZIP code:</p>

    <!-- ZIP-based selection (optional alternate flow) -->
    <input type="text" id="zip" placeholder="Enter ZIP code" />
    <button onclick="enterZip()">Continue</button>
    <p id="zipMessage" class="zip-message"></p>
    <br><br><br><br>
    
    <!-- Location button grid for when selectLocation is called -->
    <div class="locations">
      <button onclick="selectLocation('Wheaton')">Wheaton</button>
      <button onclick="selectLocation('Elmhurst')">Elmhurst</button>
      <button onclick="selectLocation('Oak Brook')">Oak Brook</button>
      <button onclick="selectLocation('Wood Dale')">Wood Dale</button>
      <button onclick="selectLocation('Roselle')">Roselle</button>
      <button onclick="selectLocation('Glendale Heights')">Glendale Heights</button>
      <button onclick="selectLocation('Bartlett')">Bartlett</button>
      <button onclick="selectLocation('Hoffman Estates')">Hoffman Estates</button>
      <button onclick="selectLocation('Westmont')">Westmont</button>
      <button onclick="selectLocation('Darien')">Darien</button>
      <button onclick="selectLocation('Bolingbrook')">Bolingbrook</button>
      <button onclick="selectLocation('Western Springs')">Western Springs</button>
    </div>
    
  </main>

  <!-- Shared script across customer pages -->
  <script src="zip_coords.js"></script>
  <script src="script.js"></script>
</body>
</html>
