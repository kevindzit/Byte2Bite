<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Checkout - Mi Casa</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <div class="hero hero-menu">
    <header>
      <h1>Mi Casa Restaurant</h1>
    </header>
  </div>

  <!-- Main area styled like the menu page -->
  <main class="menu-main">
    <div class="menu-header-bar">
      <button class="icon-btn" onclick="toggleMenu()">&#9776;</button>

      <h2 id="menu-heading">Checkout</h2>

      <button
        class="icon-btn customer-cart"
        onclick="window.location.href='checkout.html'"
      >
        &#128722; <span id="cartCount">0</span>
      </button>
    </div>

    <!-- Checkout content -->
    <div class="cart-container">
      <div id="cart-items"></div>

      <div class="order-summary">
        <div class="summary-line">
          <span>Subtotal:</span>
          <span id="subtotal">$0.00</span>
        </div>
        <div class="summary-line">
          <span>Tax:</span>
          <span id="tax-amount">$0.00</span>
        </div>
        <div id="rewards-line" class="summary-line rewards-compact" style="display:none;">
          <span id="rewards-text">Rewards:</span>
          <button id="apply-rewards-btn" class="apply-rewards-btn" onclick="toggleRewards()">Apply</button>
        </div>
        <div id="rewards-discount" class="summary-line" style="display:none;">
          <span>Rewards Discount:</span>
          <span id="discount-amount">-$0.00</span>
        </div>
        <div class="summary-total">
          <strong>Total:</strong>
          <strong id="final-total">$0.00</strong>
        </div>
      </div>

      <div class="checkout-info">
        <div class="name-field">
          <label for="customer-name">Your Name:</label>
          <input
            type="text"
            id="customer-name"
            placeholder="Enter your name"
          />
        </div>

        <div class="payment-options">
          <label class="payment-label">Payment Method:</label>
          <div class="payment-methods">
            <label class="radio-option">
              <input type="radio" name="payment-method" value="in-store" checked onchange="togglePaymentMethod()">
              <span>Pay at Restaurant</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="payment-method" value="online" onchange="togglePaymentMethod()">
              <span>Pay Online</span>
            </label>
          </div>
        </div>
      </div>

      <div id="card-element-container" style="display:none;">
        <div id="card-element" style="border: 1px solid #ccc; padding: 10px; border-radius: 4px; margin: 10px 0;"></div>
        <div id="card-errors" style="color: red; margin: 10px 0;"></div>
      </div>

      <button id="place-order-btn" class="place-order-btn" onclick="placeOrder()">Place Order</button>
    </div>
  </main>

  <div id="sideMenu" class="side-menu">
    <button class="close-btn" onclick="toggleMenu()">×</button>

    <a href="menu.html">Back to Menu</a>
    <a href="index.html">Change Location</a>
    <a href="checkout.html">View Cart</a>
    <a href="help.html">Help</a>
  </div>

  <!-- Overlay -->
  <div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>

  <script src="script.js"></script>
  <script>
    function toggleMenu() {
      const menu = document.getElementById("sideMenu");
      const overlay = document.getElementById("menuOverlay");

      menu.classList.toggle("open");
      overlay.classList.toggle("show");
    }

    // Make cartTotal a window property so loadCart can update it
    window.cartTotal = 0;
    let stripe = null;
    let cardElement = null;
    let paymentMethod = 'in-store';
    window.rewardsApplied = false;
    window.availablePoints = 0;
    const TAX_RATE = 0.0875; // 8.75% Illinois sales tax

    // Define updateRedemption immediately so it's available for loadCart
    window.updateRedemption = function() {
      const subtotal = window.cartTotal;
      const tax = subtotal * TAX_RATE;
      const beforeDiscount = subtotal + tax;

      let discount = 0;
      if (window.rewardsApplied) {
        // Use all available points up to the order total
        const maxUsable = Math.min(window.availablePoints, Math.floor(beforeDiscount * 100));
        discount = maxUsable / 100;
      }

      const finalTotal = Math.max(beforeDiscount - discount, 0);

      document.getElementById("subtotal").textContent = `$${subtotal.toFixed(2)}`;
      document.getElementById("tax-amount").textContent = `$${tax.toFixed(2)}`;
      document.getElementById("discount-amount").textContent = `-$${discount.toFixed(2)}`;
      document.getElementById("final-total").textContent = `$${finalTotal.toFixed(2)}`;
    }

    // Define showRewardsIfApplicable early as well
    window.showRewardsIfApplicable = function() {
      const session = getCustomerSession();
      const rewardsLine = document.getElementById("rewards-line");
      const rewardsText = document.getElementById("rewards-text");

      if (session) {
        window.availablePoints = session.rewardsPoints || 0;

        if (window.availablePoints > 0) {
          // Show points available with Apply button
          const dollars = (window.availablePoints / 100).toFixed(2);
          rewardsText.textContent = `Rewards (${window.availablePoints} points = $${dollars}):`;
          rewardsLine.style.display = "flex";
          document.getElementById("apply-rewards-btn").style.display = "inline-block";
        } else {
          // Show message that no points are available
          rewardsText.textContent = "You don't have any rewards points yet";
          document.getElementById("apply-rewards-btn").style.display = "none";
          rewardsLine.style.display = "flex";
        }
      } else {
        rewardsLine.style.display = "none";
      }

      window.updateRedemption();
    }

    async function initStripe() {
      const res = await fetch(`${API_BASE}/api/stripe-key`);
      const data = await res.json();
      stripe = Stripe(data.publishable_key);
      const elements = stripe.elements();
      cardElement = elements.create('card', {
        style: {
          base: {
            fontSize: '16px',
            color: '#32325d',
          }
        }
      });
      cardElement.mount('#card-element');

      cardElement.on('change', event => {
        const displayError = document.getElementById('card-errors');
        displayError.textContent = event.error ? event.error.message : '';
      });
    }

    function togglePaymentMethod() {
      paymentMethod = document.querySelector('input[name="payment-method"]:checked').value;
      const container = document.getElementById('card-element-container');
      const btn = document.getElementById('place-order-btn');

      if (paymentMethod === 'online') {
        container.style.display = 'block';
        btn.textContent = 'Complete Payment';
        if (!stripe) initStripe();
      } else {
        container.style.display = 'none';
        btn.textContent = 'Place Order';
      }
    }

    function toggleRewards() {
      window.rewardsApplied = !window.rewardsApplied;
      window.updateRedemption();

      const btn = document.getElementById("apply-rewards-btn");
      const discountLine = document.getElementById("rewards-discount");

      if (window.rewardsApplied) {
        btn.textContent = "Remove";
        btn.classList.add("applied");
        discountLine.style.display = "flex";
      } else {
        btn.textContent = "Apply";
        btn.classList.remove("applied");
        discountLine.style.display = "none";
      }
    }

    (function initCheckoutPage() {
      const heading = document.getElementById("menu-heading");
      const loc = getStoredLocation();

      if (heading && loc && loc.label) {
        heading.textContent = `${loc.label} Checkout`;
      }

      updateCartCount();
      loadCart();
      const session = getCustomerSession();
      if (session) {
        document.getElementById("customer-name").value = `${session.firstName || ""} ${session.lastName || ""}`.trim();
        // Show rewards section after cart is loaded
        setTimeout(() => window.showRewardsIfApplicable(), 100);
      }
    })();
  </script>
</body>
</html>
