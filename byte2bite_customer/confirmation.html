<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Order Confirmation - Byte2Bite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="center">
    <h1>Thank you for your order!</h1>
    <p id="orderMsg"></p>
    <a href="index.html" class="btn">Return to Home</a>
  </main>

  <script>
    const msg = localStorage.getItem("orderMsg");
    document.getElementById("orderMsg").textContent = msg || "Your order has been placed.";
  </script>
</body>
</html>
