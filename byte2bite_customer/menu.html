<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Byte 2 Bite - Menu</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #1e1e1e;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    /* Fullscreen hero image */
    .hero {
      position: relative;
      width: 100%;
      height: 30vh;
      background: url('food.webp') no-repeat center center;
      background-size: cover;
    }

    header {
      position: absolute;
      top: 0;
      width: 100%;
      padding: 20px;
      background: rgba(0,0,0,0.35); /* Adds readability */
      backdrop-filter: blur(3px); /* Nice glass effect */
    }

    h1 {
      margin: 0;
      font-size: 2rem;
    }

    main {
      margin-top: 40px;
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .locations {
	  display: grid;
      grid-template-columns: repeat(3, 1fr); /* 3 columns */
      gap: 12px;
      max-width: 600px;
      margin: 0 auto 20px;
    }


    button {
      background-color: #ffcc00;
      color: black;
      border: none;
      border-radius: 5px;
      padding: 10px 20px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #ffaa00;
    }

    input {
      padding: 10px;
      border: none;
      border-radius: 5px;
      width: 200px;
      font-size: 1em;
      margin-top: 10px;
    }

    input:focus {
      outline: none;
      box-shadow: 0 0 5px #ffcc00;
    }
  </style>
</head>
<body>

	<div class="hero">
    <header>
      <h1>Mi Casa Menu</h1>
    </header>
  </div>

  <div id="menu-container">Loading menu...</div>

  <a href="checkout.html" class="cart-btn">Go to Cart</a>

  <script src="script.js"></script>
  <script>
    // Load menu from Flask for a default location (e.g., "Wheaton")
      const selected = localStorage.getItem("selectedLocation") || "Wheaton";
      loadMenu(selected);
  </script>
</body>
</html>
